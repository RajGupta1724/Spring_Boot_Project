databases:
  - name: emp-db
    plan: free
    databaseName: empdb
    user: empuser

services:
  - type: web
    name: emp-project-backend
    plan: free
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/emp-project-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emp-db
          property: connectionURI
      - key: DATABASE_USERNAME
        fromDatabase:
          name: emp-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: emp-db
          property: password
      - key: FRONTEND_URL
        value: https://emp-project-view.onrender.com

  - type: web
    name: emp-project-view
    plan: static
    buildCommand: cd emp-project-view && npm install && npm run build
    staticPublishPath: emp-project-view/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://emp-project-backend.onrender.com
